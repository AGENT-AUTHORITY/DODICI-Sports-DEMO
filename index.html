<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dodici Sports Management — Portfolio</title>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --c0: #0A0A0A;
      --c1: #141414;
      --c2: #1A1A1A;
      --c3: #242424;
      --bone: #F5F3EE;
      --bone2: #C8C4BB;
      --gold: #C9A24B;
      --gold-l: #D9B56A;
      --gold-d: #A8842F;
      --hot: #E05A45;
      --warm: #C9A24B;
      --cold: #4B5563;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--c0);
      color: var(--bone);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .serif { font-family: 'Playfair Display', serif; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: var(--c0); }
    ::-webkit-scrollbar-thumb { background: var(--c3); border-radius: 2px; }

    /* gold line */
    .gold-line {
      height: 1px;
      background: linear-gradient(90deg, var(--gold), transparent);
    }

    /* nav */
    .nav-glass {
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    /* card */
    .player-card {
      background: var(--c1);
      border: 1px solid #222;
      overflow: hidden;
      transition: border-color .3s ease, transform .3s ease, box-shadow .3s ease;
      cursor: pointer;
    }
    .player-card:hover {
      border-color: var(--gold);
      transform: translateY(-5px);
      box-shadow: 0 24px 48px rgba(201,162,75,.12);
    }
    .card-overlay {
      background: linear-gradient(to top,
        rgba(8,8,8,1) 0%,
        rgba(8,8,8,.88) 28%,
        rgba(8,8,8,.3) 58%,
        rgba(8,8,8,.08) 100%);
    }

    /* stat bars */
    .bar-track { height: 2px; background: var(--c3); border-radius: 2px; overflow: hidden; }
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold-d), var(--gold));
      border-radius: 2px;
      width: 0;
      transition: width 1.3s cubic-bezier(.4,0,.2,1);
    }

    /* photo placeholder */
    .photo-ph {
      background: linear-gradient(145deg, var(--c2) 0%, var(--c3) 100%);
      display: flex; align-items: center; justify-content: center;
    }

    /* demo badge */
    .demo-tag {
      font-size: 9px; letter-spacing: .18em; text-transform: uppercase;
      color: #3D3D3D; border: 1px solid #222; padding: 2px 8px; display: inline-block;
    }

    /* tracking rows */
    .t-row { border-bottom: 1px solid #161616; transition: background .2s; }
    .t-row:hover { background: #111; }

    /* interest dots */
    .dot-hot  { background: var(--hot);  box-shadow: 0 0 8px rgba(224,90,69,.5); }
    .dot-warm { background: var(--warm); box-shadow: 0 0 8px rgba(201,162,75,.4); }
    .dot-cold { background: var(--cold); }

    /* video block */
    .video-ph {
      aspect-ratio: 16/9;
      background: linear-gradient(135deg, var(--c1), var(--c2));
      border: 1px solid #222;
      display: flex; align-items: center; justify-content: center;
    }
    .play-ring {
      width: 68px; height: 68px; border: 1.5px solid var(--gold);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      transition: background .25s, transform .25s;
    }
    .play-ring:hover { background: var(--gold); transform: scale(1.06); }

    /* section tag */
    .sec-tag { font-size: 10px; letter-spacing: .28em; text-transform: uppercase; color: var(--gold); }

    /* metric card */
    .metric-card {
      border: 1px solid var(--c3); padding: 16px;
      transition: border-color .25s;
    }
    .metric-card:hover { border-color: var(--gold); }

    /* stat big card */
    .stat-card {
      border: 1px solid var(--c3);
      text-align: center; padding: 24px 16px;
      transition: border-color .25s;
    }
    .stat-card:hover { border-color: var(--gold); }
  </style>
</head>
<body x-data="dodici()" x-init="init()">

<!-- ═══════════════════════════ NAV ═══════════════════════════ -->
<nav class="nav-glass fixed top-0 left-0 right-0 z-50 border-b border-[#1A1A1A]">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
    <button @click="go('hub')" class="flex flex-col items-start group">
      <span class="serif text-[22px] leading-none tracking-[.18em] text-[#C9A24B] group-hover:text-[#D9B56A] transition-colors duration-200">DODICI</span>
      <span class="text-[8px] tracking-[.32em] uppercase text-[#383530] mt-0.5">Sports Management</span>
    </button>
    <div class="flex items-center gap-1 sm:gap-2">
      <button @click="go('hub')" :class="view==='hub' ? 'text-[#C9A24B] border-[#C9A24B30]' : 'text-[#4B5563] border-[#1A1A1A]'" class="text-[9px] tracking-[.22em] uppercase border px-3 py-1.5 transition-all hover:text-[#C9A24B] hover:border-[#C9A24B40]">Cartera</button>
      <button @click="view!=='hub' && go('dossier')" :class="view==='dossier' ? 'text-[#C9A24B] border-[#C9A24B30]' : 'text-[#4B5563] border-[#1A1A1A]'" :disabled="!selectedPlayer" class="text-[9px] tracking-[.22em] uppercase border px-3 py-1.5 transition-all hover:text-[#C9A24B] hover:border-[#C9A24B40] disabled:opacity-25">Dossier</button>
      <button @click="selectedPlayer && go('tracking')" :class="view==='tracking' ? 'text-[#C9A24B] border-[#C9A24B30]' : 'text-[#4B5563] border-[#1A1A1A]'" :disabled="!selectedPlayer" class="text-[9px] tracking-[.22em] uppercase border px-3 py-1.5 transition-all hover:text-[#C9A24B] hover:border-[#C9A24B40] disabled:opacity-25">Tracking</button>
    </div>
  </div>
</nav>

<!-- ═══════════════════════════════════════════════════════════ -->
<!--  VISTA 1 — HUB                                             -->
<!-- ═══════════════════════════════════════════════════════════ -->
<div x-show="view==='hub'" x-transition:enter="transition-opacity ease-out duration-300" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100" class="min-h-screen pt-16">

  <!-- Hero header -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 pt-16 pb-14">
    <p class="sec-tag mb-4">+30 Años · Representación Global</p>
    <h1 class="serif text-[52px] sm:text-[80px] leading-none text-[#F5F3EE] mb-5">
      Nuestra<br><em class="text-[#C9A24B]">Cartera</em>
    </h1>
    <div class="gold-line w-28 mb-5"></div>
    <p class="text-[#8A8580] text-sm max-w-sm leading-relaxed">
      Acompañamos jugadores que cumplen sus sueños en todo el mundo.<br>Seleccioná un perfil para explorar.
    </p>
  </div>

  <!-- Grid -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 pb-28">
    <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 sm:gap-5">
      <template x-for="p in players" :key="p.id">
        <div class="player-card" @click="open(p)">
          <div class="relative" style="aspect-ratio:2/3">

            <!-- Player photo (branded Instagram card) -->
            <img :src="p.photo" :alt="p.name" class="w-full h-full object-cover object-top">

            <div class="card-overlay absolute inset-0"></div>

            <!-- corner accent -->
            <div class="absolute top-3 right-3 w-5 h-[1.5px] bg-[#C9A24B]"></div>
            <div class="absolute top-3 right-3 w-[1.5px] h-5 bg-[#C9A24B]"></div>

            <div class="absolute bottom-0 left-0 right-0 p-4">
              <p class="text-[9px] tracking-[.24em] uppercase text-[#C9A24B] mb-1" x-text="p.position"></p>
              <h3 class="serif text-[17px] leading-snug text-[#F5F3EE]" x-text="p.name"></h3>
              <p class="text-[11px] text-[#9B9590] mt-0.5" x-text="p.club + '  ' + p.flag"></p>
            </div>
          </div>
        </div>
      </template>
    </div>
  </div>

</div>

<!-- ═══════════════════════════════════════════════════════════ -->
<!--  VISTA 2 — DOSSIER                                         -->
<!-- ═══════════════════════════════════════════════════════════ -->
<div x-show="view==='dossier'" x-transition:enter="transition-opacity ease-out duration-300" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100" class="min-h-screen pt-16">
  <template x-if="selectedPlayer">
    <div>

      <!-- § HERO -->
      <div class="relative min-h-[72vh] flex items-end overflow-hidden">
        <!-- bg photo -->
        <div class="absolute inset-0">
          <img :src="selectedPlayer.photo" :alt="selectedPlayer.name" class="w-full h-full object-cover object-top opacity-30">
          <div class="absolute inset-0" style="background:linear-gradient(to right, rgba(8,8,8,.97) 38%, rgba(8,8,8,.6) 100%), linear-gradient(to top, rgba(8,8,8,.95) 0%, transparent 50%)"></div>
        </div>

        <div class="relative max-w-7xl mx-auto px-4 sm:px-6 py-14 w-full">
          <button @click="go('hub')" class="flex items-center gap-2 text-[#4B5563] hover:text-[#C9A24B] transition-colors text-[10px] tracking-[.22em] uppercase mb-10 group">
            <svg class="w-3.5 h-3.5 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 12H5M12 5l-7 7 7 7"/></svg>
            Volver a la cartera
          </button>

          <div class="max-w-2xl">
            <p class="sec-tag mb-3" x-text="selectedPlayer.position"></p>
            <h1 class="serif text-[48px] sm:text-[72px] leading-none text-[#F5F3EE] mb-5" x-text="selectedPlayer.name"></h1>
            <div class="gold-line w-20 mb-8"></div>
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-6 mb-10">
              <div>
                <p class="text-[9px] tracking-[.22em] uppercase text-[#4B5563] mb-1">Club</p>
                <p class="text-sm text-[#F5F3EE]" x-text="selectedPlayer.club"></p>
              </div>
              <div>
                <p class="text-[9px] tracking-[.22em] uppercase text-[#4B5563] mb-1">Edad</p>
                <p class="text-sm text-[#F5F3EE]" x-text="selectedPlayer.age + ' años'"></p>
              </div>
              <div>
                <p class="text-[9px] tracking-[.22em] uppercase text-[#4B5563] mb-1">País</p>
                <p class="text-sm text-[#F5F3EE]" x-text="selectedPlayer.country + ' ' + selectedPlayer.flag"></p>
              </div>
              <div>
                <p class="text-[9px] tracking-[.22em] uppercase text-[#4B5563] mb-1">Valor de mercado</p>
                <p class="text-sm text-[#C9A24B] font-medium" x-text="selectedPlayer.marketValue"></p>
              </div>
            </div>
            <div class="flex gap-3 flex-wrap">
              <button @click="go('tracking')" class="text-[10px] tracking-[.2em] uppercase px-5 py-2.5 border border-[#C9A24B] text-[#C9A24B] hover:bg-[#C9A24B] hover:text-[#0A0A0A] transition-all">Ver Tracking</button>
              <button class="text-[10px] tracking-[.2em] uppercase px-5 py-2.5 border border-[#2A2A2A] text-[#5A5A5A] hover:border-[#444] hover:text-[#888] transition-all">Compartir Perfil</button>
            </div>
          </div>
        </div>
      </div>

      <!-- § VIDEO REEL -->
      <div class="max-w-7xl mx-auto px-4 sm:px-6 py-16 border-t border-[#141414]">
        <p class="sec-tag mb-2">Highlights</p>
        <h2 class="serif text-[32px] text-[#F5F3EE] mb-8">Video Reel</h2>
        <!--
          REEMPLAZAR por iframe cuando se tenga el ID de YouTube:
          <iframe class="w-full rounded-lg" style="aspect-ratio:16/9" frameborder="0"
            :src="'https://www.youtube.com/embed/' + selectedPlayer.youtubeId"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen></iframe>
          Agregar youtubeId: 'ID' a cada jugador en el array JS.
        -->
        <div class="video-ph rounded-lg">
          <div class="text-center">
            <div class="play-ring mx-auto mb-4">
              <svg class="w-7 h-7 text-[#C9A24B] ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </div>
            <p class="text-[9px] tracking-[.22em] uppercase text-[#333]">Video Reel — pegar youtubeId en el array de datos</p>
          </div>
        </div>
      </div>

      <!-- § PERFIL TÉCNICO -->
      <div class="border-t border-[#141414] bg-[#0C0C0C]">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-16">
          <p class="sec-tag mb-2">Análisis</p>
          <h2 class="serif text-[32px] text-[#F5F3EE] mb-12">Perfil Técnico</h2>
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-start">

            <!-- Radar SVG -->
            <div>
              <p class="text-[9px] tracking-[.22em] uppercase text-[#4B5563] mb-6 text-center">Radar de atributos</p>
              <svg viewBox="-40 -22 380 344" class="w-full max-w-xs mx-auto">
                <circle cx="150" cy="150" r="110" fill="none" stroke="#1E1E1E" stroke-width="1"/>
                <circle cx="150" cy="150" r="82" fill="none" stroke="#1A1A1A" stroke-width="1"/>
                <circle cx="150" cy="150" r="55" fill="none" stroke="#191919" stroke-width="1"/>
                <circle cx="150" cy="150" r="27" fill="none" stroke="#181818" stroke-width="1"/>
                <line x1="150" y1="40" x2="150" y2="260" stroke="#1C1C1C" stroke-width="1"/>
                <line x1="150" y1="150" x2="245.3" y2="95" stroke="#1C1C1C" stroke-width="1"/>
                <line x1="150" y1="150" x2="245.3" y2="205" stroke="#1C1C1C" stroke-width="1"/>
                <line x1="150" y1="150" x2="54.7" y2="205" stroke="#1C1C1C" stroke-width="1"/>
                <line x1="150" y1="150" x2="54.7" y2="95" stroke="#1C1C1C" stroke-width="1"/>
                <polygon :points="radarPts(selectedPlayer.attributes)" fill="rgba(201,162,75,.13)" stroke="#C9A24B" stroke-width="1.5"/>
                <template x-for="(pt, i) in radarArr(selectedPlayer.attributes)" :key="i">
                  <circle :cx="pt.x" :cy="pt.y" r="3.5" fill="#C9A24B"/>
                </template>
                <text x="150" y="24" text-anchor="middle" fill="#555" font-size="7" font-family="Inter" letter-spacing="0.9">VELOCIDAD</text>
                <text x="258" y="93" text-anchor="start" fill="#555" font-size="7" font-family="Inter" letter-spacing="0.9">TÉCNICA</text>
                <text x="258" y="212" text-anchor="start" fill="#555" font-size="7" font-family="Inter" letter-spacing="0.9">FÍSICO</text>
                <text x="150" y="284" text-anchor="middle" fill="#555" font-size="7" font-family="Inter" letter-spacing="0.9">DEFINICIÓN</text>
                <text x="42" y="212" text-anchor="end" fill="#555" font-size="7" font-family="Inter" letter-spacing="0.9">VISIÓN</text>
                <text x="42" y="93" text-anchor="end" fill="#555" font-size="7" font-family="Inter" letter-spacing="0.9">LIDERAZGO</text>
              </svg>
            </div>

            <!-- Attribute bars -->
            <div class="space-y-5">
              <template x-for="a in attrList(selectedPlayer)" :key="a.k">
                <div>
                  <div class="flex justify-between mb-2">
                    <span class="text-[10px] tracking-[.18em] uppercase text-[#6B6560]" x-text="a.label"></span>
                    <span class="text-[11px] text-[#C9A24B] font-medium" x-text="a.v"></span>
                  </div>
                  <div class="bar-track">
                    <div class="bar-fill" :id="'bar-' + selectedPlayer.id + '-' + a.k" :data-width="a.v + '%'"></div>
                  </div>
                </div>
              </template>
              <div class="pt-4"><span class="demo-tag">Datos ilustrativos — demo</span></div>
            </div>

          </div>
        </div>
      </div>

      <!-- § MAPA DE CALOR -->
      <div class="border-t border-[#141414]">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-16">
          <p class="sec-tag mb-2">Posicionamiento</p>
          <h2 class="serif text-[32px] text-[#F5F3EE] mb-4">Mapa de Calor</h2>
          <p class="text-[#5A5A5A] text-[13px] mb-10">Zonas de mayor participación e influencia</p>

          <div class="max-w-xs mx-auto">
            <div class="rounded-lg overflow-hidden border border-[#181818]">
              <svg viewBox="0 0 240 340" class="w-full" style="background:#0A160A">
                <defs>
                  <radialGradient id="gh" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#E05A45" stop-opacity="1"/>
                    <stop offset="50%" stop-color="#C9A24B" stop-opacity=".7"/>
                    <stop offset="100%" stop-color="#C9A24B" stop-opacity="0"/>
                  </radialGradient>
                  <radialGradient id="gm" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#C9A24B" stop-opacity=".9"/>
                    <stop offset="100%" stop-color="#C9A24B" stop-opacity="0"/>
                  </radialGradient>
                  <radialGradient id="gl" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#4A8AD4" stop-opacity=".7"/>
                    <stop offset="100%" stop-color="#4A8AD4" stop-opacity="0"/>
                  </radialGradient>
                </defs>
                <rect x="10" y="10" width="220" height="320" fill="none" stroke="#1C321C" stroke-width="1.5" rx="3"/>
                <line x1="10" y1="170" x2="230" y2="170" stroke="#1C321C" stroke-width="1"/>
                <circle cx="120" cy="170" r="28" fill="none" stroke="#1C321C" stroke-width="1"/>
                <circle cx="120" cy="170" r="2" fill="#1C321C"/>
                <rect x="52" y="10" width="136" height="62" fill="none" stroke="#1C321C" stroke-width="1"/>
                <rect x="82" y="10" width="76" height="26" fill="none" stroke="#1C321C" stroke-width="1"/>
                <rect x="52" y="268" width="136" height="62" fill="none" stroke="#1C321C" stroke-width="1"/>
                <rect x="82" y="304" width="76" height="26" fill="none" stroke="#1C321C" stroke-width="1"/>
                <circle cx="120" cy="54" r="2" fill="#1C321C"/>
                <circle cx="120" cy="286" r="2" fill="#1C321C"/>
                <ellipse :cx="selectedPlayer.hm.px" :cy="selectedPlayer.hm.py" rx="52" ry="38" fill="url(#gh)" opacity=".75"/>
                <ellipse :cx="selectedPlayer.hm.sx" :cy="selectedPlayer.hm.sy" rx="38" ry="28" fill="url(#gm)" opacity=".55"/>
                <ellipse :cx="selectedPlayer.hm.tx" :cy="selectedPlayer.hm.ty" rx="28" ry="22" fill="url(#gl)" opacity=".4"/>
              </svg>
            </div>
            <div class="flex justify-center gap-5 mt-4">
              <div class="flex items-center gap-1.5"><div class="w-2.5 h-2.5 rounded-full bg-[#E05A45]"></div><span class="text-[10px] text-[#5A5A5A]">Alta</span></div>
              <div class="flex items-center gap-1.5"><div class="w-2.5 h-2.5 rounded-full bg-[#C9A24B]"></div><span class="text-[10px] text-[#5A5A5A]">Media</span></div>
              <div class="flex items-center gap-1.5"><div class="w-2.5 h-2.5 rounded-full bg-[#4A8AD4]"></div><span class="text-[10px] text-[#5A5A5A]">Frecuente</span></div>
            </div>
            <div class="text-center mt-3"><span class="demo-tag">Datos ilustrativos — demo</span></div>
          </div>
        </div>
      </div>

      <!-- § FÍSICO Y PERFIL HUMANO -->
      <div class="border-t border-[#141414] bg-[#0C0C0C]">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-16">
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-16">

            <div>
              <p class="sec-tag mb-2">Condición</p>
              <h2 class="serif text-[32px] text-[#F5F3EE] mb-8">Perfil Físico</h2>
              <div class="grid grid-cols-2 gap-3">
                <template x-for="m in selectedPlayer.physical" :key="m.label">
                  <div class="metric-card">
                    <p class="serif text-[24px] text-[#C9A24B] leading-none mb-1" x-text="m.value"></p>
                    <p class="text-[9px] tracking-[.18em] uppercase text-[#4B5563]" x-text="m.label"></p>
                  </div>
                </template>
              </div>
              <div class="mt-4"><span class="demo-tag">Datos ilustrativos — demo</span></div>
            </div>

            <div>
              <p class="sec-tag mb-2">Historia</p>
              <h2 class="serif text-[32px] text-[#F5F3EE] mb-8">Perfil Humano</h2>
              <p class="text-[#7A7570] text-[14px] leading-relaxed" x-text="selectedPlayer.story"></p>
              <div class="flex flex-wrap gap-2 mt-6">
                <template x-for="v in selectedPlayer.values" :key="v">
                  <span class="text-[9px] tracking-[.18em] uppercase px-3 py-1 border border-[#222] text-[#4B5563]" x-text="v"></span>
                </template>
              </div>
            </div>

          </div>
        </div>
      </div>

      <!-- § ESTADÍSTICAS -->
      <div class="border-t border-[#141414]">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-16">
          <div class="flex items-end justify-between mb-10 flex-wrap gap-4">
            <div>
              <p class="sec-tag mb-2">Performance</p>
              <h2 class="serif text-[32px] text-[#F5F3EE]">Estadísticas de Temporada</h2>
            </div>

    go(v) {
      this.view = v;
      window.scrollTo({ top: 0, behavior: 'smooth' });
      if (v === 'dossier') {
        setTimeout(() => this.animateBars(), 150);
      }
    },

    open(player) {
      this.selectedPlayer = player;
      this.go('dossier');
    },

    animateBars() {
      document.querySelectorAll('.bar-fill[data-width]').forEach(el => {
        el.style.width = el.dataset.width;
      });
    },

    attrList(player) {
      if (!player) return [];
      const labels = {
        velocidad: 'Velocidad', tecnica: 'Tecnica', vision: 'Vision de juego',
        definicion: 'Definicion', fisico: 'Fisico', liderazgo: 'Liderazgo'
      };
      return Object.entries(player.attributes).map(([k, v]) => ({ k, label: labels[k] || k, v }));
    },

    radarArr(attrs) {
      if (!attrs) return [];
      const cx = 150, cy = 150, R = 110;
      const vals = [attrs.velocidad, attrs.tecnica, attrs.fisico, attrs.definicion, attrs.vision, attrs.liderazgo];
      const degs = [-90, -30, 30, 90, 150, 210];
      return vals.map((v, i) => {
        const a = degs[i] * Math.PI / 180;
        return { x: cx + R * (v / 100) * Math.cos(a), y: cy + R * (v / 100) * Math.sin(a) };
      });
    },

    radarPts(attrs) {
      return this.radarArr(attrs).map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
    },

    initScrollReveal() {
      const io = new IntersectionObserver(entries => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
      }, { threshold: 0.12 });
      document.querySelectorAll('.reveal').forEach(el => io.observe(el));
    },

    init() {
      this.initScrollReveal();
    }
